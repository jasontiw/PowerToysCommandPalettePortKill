name: Update WinGet Manifest

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: true
        type: string

env:
  EXTENSION_NAME: ${{ vars.EXTENSION_NAME || 'PortKill' }}
  GITHUB_USER: ${{ vars.GITHUB_USER || 'jasontiw' }}
  REPO_NAME: ${{ vars.REPO_NAME || 'PowerToysCommandPalettePortKill' }}
  PACKAGE_ID: ${{ vars.PACKAGE_ID || 'JasonTiw.PortKill' }}

jobs:
  update-winget:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get release info
        id: release
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            $version = "${{ github.event.inputs.version }}"
          } else {
            $version = "${{ github.event.release.tag_name }}" -replace "v", ""
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Install wingetcreate
        run: |
          iwr https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

      - name: Update WinGet manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.release.outputs.VERSION }}"
          $tag = "v$version"
          
          $x64Url = "https://github.com/${{ env.GITHUB_USER }}/${{ env.REPO_NAME }}/releases/download/$tag/${{ env.EXTENSION_NAME }}-Setup-$version-x64.exe"
          $arm64Url = "https://github.com/${{ env.GITHUB_USER }}/${{ env.REPO_NAME }}/releases/download/$tag/${{ env.EXTENSION_NAME }}-Setup-$version-arm64.exe"
          
          Write-Host "Updating WinGet manifest for version $version"
          .\wingetcreate.exe update ${{ env.PACKAGE_ID }} `
            --version $version `
            --urls "$x64Url|x64" "$arm64Url|arm64" `
            --token $env:GITHUB_TOKEN `
            --submit
        shell: pwsh
