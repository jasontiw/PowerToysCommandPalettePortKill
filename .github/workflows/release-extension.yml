name: CmdPal Extension - Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: true
        type: string
      release_notes:
        description: 'What is new in this version'
        required: false
        default: 'New release with latest updates and improvements.'
        type: string

env:
  DISPLAY_NAME: ${{ vars.DISPLAY_NAME || 'PortKill' }}
  EXTENSION_NAME: ${{ vars.EXTENSION_NAME || 'PortKill' }}
  FOLDER_NAME: ${{ vars.FOLDER_NAME || 'PortKill' }}
  GITHUB_REPO_URL: ${{ vars.GITHUB_REPO_URL || 'https://github.com/jasontiw/PowerToysCommandPalettePortKill' }}
  GITHUB_USER: ${{ vars.GITHUB_USER || 'jasontiw' }}
  PACKAGE_ID: ${{ vars.PACKAGE_ID || 'JasonTiw.PortKill' }}

jobs:
  build-and-release:
    runs-on: windows-2022
    permissions:
      contents: write
      actions: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Install Inno Setup
      run: choco install innosetup -y --no-progress
      shell: pwsh
    
    - name: Build EXE installers (x64 and ARM64)
      run: |
        Set-Location "${{ env.FOLDER_NAME }}/${{ env.EXTENSION_NAME }}"
        .\build-exe.ps1 -Version "${{ github.event.inputs.version }}" -Platforms "x64","arm64" -WindowsPackageType None
      shell: pwsh
    
    - name: Create GitHub Release
      id: release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.event.inputs.version }}
        name: "${{ env.DISPLAY_NAME }} v${{ github.event.inputs.version }}"
        body: |
          ## ${{ env.DISPLAY_NAME }} v${{ github.event.inputs.version }}
          
          ## What's New
          ${{ github.event.inputs.release_notes }}
          
          ## Installation
          
          Download the installer for your system architecture:
          
          - **x64 (Intel/AMD)**: `${{ env.EXTENSION_NAME }}-Setup-${{ github.event.inputs.version }}-x64.exe`
          - **ARM64 (Windows on ARM)**: `${{ env.EXTENSION_NAME }}-Setup-${{ github.event.inputs.version }}-arm64.exe`
          
          1. Download the appropriate installer from the Assets section below
          2. Run the installer with administrator privileges
          3. The extension will be registered and available in Command Palette

          ## More Information
          
          Repository: ${{ env.GITHUB_REPO_URL }}
        files: ${{ env.FOLDER_NAME }}/${{ env.EXTENSION_NAME }}/bin/Release/installer/*.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Install wingetcreate
      run: |
        iwr https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
      shell: pwsh
    
    - name: Update WinGet manifest
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $version = "${{ github.event.inputs.version }}"
        $tag = "v$version"
        
        $x64Url = "https://github.com/${{ env.GITHUB_USER }}/${{ env.FOLDER_NAME }}/releases/download/$tag/${{ env.EXTENSION_NAME }}-Setup-$version-x64.exe"
        $arm64Url = "https://github.com/${{ env.GITHUB_USER }}/${{ env.FOLDER_NAME }}/releases/download/$tag/${{ env.EXTENSION_NAME }}-Setup-$version-arm64.exe"
        
        Write-Host "Updating WinGet manifest for version $version"
        .\wingetcreate.exe update ${{ env.PACKAGE_ID }} `
          --version $version `
          --urls "$x64Url|x64" "$arm64Url|arm64" `
          --token $env:GITHUB_TOKEN `
          --submit
      shell: pwsh
